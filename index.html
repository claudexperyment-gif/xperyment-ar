<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XPERYMENT AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .a-enter-vr { display: none !important; }
    #a-enter-vr-button { display: none !important; }
    .a-orientation-modal { display: none !important; }
    .a-dialog { display: none !important; }
    .a-dialog-allow-button { display: none !important; }
    .a-dialog-deny-button { display: none !important; }
    .a-dialog-ok-button { display: none !important; }
    .a-modal { display: none !important; }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    renderer="colorManagement: true"
    xr-mode-ui="enabled: false"
  >
    <a-assets>
      <img id="overlay" src="./overlay.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane
        src="#overlay"
        position="0 0.5 0"
        width="1"
        height="1.5"
        rotation="0 0 0"
        material="shader: flat; src: #overlay; transparent: true; alphaTest: 0.05; side: double"
      ></a-plane>
    </a-entity>
  </a-scene>
</body>
</html>
